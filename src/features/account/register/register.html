<div class="card bg-base-100 w-1/2 mx-auto flex flex-col p-6 rounded-lg shadow-lg">
    <div class="card-title justify-center text-3xl text-primary">Sign Up</div>
    <div class="card-body w-full">
        <form #registerForm="ngForm" (ngSubmit)="register()" class="flex flex-col gap-4 w-full">
            <input type="text" class="input w-full" name="email" [(ngModel)]="creds.email" placeholder="Email">
            <input type="text" class="input w-full" name="displetName" [(ngModel)]="creds.displetName" placeholder="Displey Name">
            <input type="password" class="input w-full" name="password" [(ngModel)]="creds.password" placeholder="password">

            <div class="flex items-center justify-end gap-4">
                <button class="btn" type="button" (click)="cancel()">Cancel</button>
                <button type="submit" class="btn btn-primary">Register</button>
            </div>
        </form>
    </div>
</div>
