@if(member();as member){
<div class="flex flex-col gap-3">
  <div class="flex gap-3">
    <span class="font-semibold">Member since:</span>
    <span class="font-semibold">{{member.created | date: 'longDate'}}</span>
  </div>
  <div class="flex gap-3">
    <span class="font-semibold">Last active:</span>
    <span class="font-semibold">{{member.lastActive | date: 'dd MMM yyy h:mm a'}}</span>
  </div>
  <h3 class="text-lg font-semibold text-primary">About {{member.displetName}}</h3>
  <div class="">{{member.description}}</div>

</div>
}
